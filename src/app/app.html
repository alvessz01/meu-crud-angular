<div class="container mt-4">
  <h2 class="text-center mb-4">Gerenciador de Contatos</h2>

  <div *ngIf="mensagem" class="alert alert-success shadow-sm text-center">
    {{ mensagem }}
  </div>

  <div class="card p-4 mb-4 shadow-sm border-0">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Nome</label>
        <input type="text" class="form-control" [(ngModel)]="novoNome" placeholder="Nome">
      </div>
      <div class="col-md-4">
        <label class="form-label">Data</label>
        <input type="date" class="form-control" [(ngModel)]="novaData">
      </div>
      <div class="col-md-4">
        <label class="form-label">Telefone</label>
        <input type="text" class="form-control" [(ngModel)]="novoTelefone" placeholder="Telefone">
      </div>
      <div class="col-12 text-center mt-3">
        <button class="btn btn-success px-5" *ngIf="!itemEmEdicao" (click)="adicionarItem()">Adicionar</button>
        <button class="btn btn-primary px-5" *ngIf="itemEmEdicao" (click)="salvarEdicao()">Salvar Alterações</button>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover border shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>Nome</th>
          <th>Data</th>
          <th>Telefone</th>
          <th class="text-center">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of itens">
          <td>{{ item.nome }}</td>
          <td>{{ item.dataNascimento }}</td>
          <td>{{ item.telefone }}</td>
          <td class="text-center">
            <button class="btn btn-warning btn-sm me-2" (click)="editarItem(item)">Editar</button>
            <button class="btn btn-danger btn-sm" (click)="deletarItem(item.id)">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
